# ######## Window rules ########
# Uncomment to apply global transparency to all windows:
windowrule {
  name = windowrule-1
  opacity = 0.89 override 0.89 override
  match:class = .*
}


# Disable blur for XWayland windows (or context menus with shadow would look weird)
windowrule {
  name = windowrule-2
  no_blur = on
  match:xwayland = 1
}


# Special Rules by gabzu
# windowrulev2 = center,class:^(Cursor)$
windowrule {
  name = windowrule-3
  opacity = 1.0
  match:class = ^(Mysql-workbench-bin)$
}

# windowrulev2 = size 1632 918,class:^(Cursor)$
# windowrulev2 = float,class:(Cursor)$
# windowrulev2 = opacity 1.0,class:(Cursor)$
# windowrulev2 = center,class:^(dev.zed.Zed-Dev)$
# windowrulev2 = size 1632 918,class:^(dev.zed.Zed-Dev)$
# windowrulev2 = float,class:(dev.zed.Zed-Dev)$
# windowrulev2 = opacity 1.0,class:(dev.zed.Zed-Dev)$
windowrule {
  name = windowrule-4
  center = on
  float = on
  size = 900 600
  match:class = ^(org.qbittorrent.qBittorrent)$
}

# windowrulev2 = center,class:^(zen)$
# windowrulev2 = size 1632 918,class:^(zen)$
# windowrulev2 = float,class:^(zen)$
windowrule {
  name = windowrule-5
  workspace = 1 silent
  match:class = ^(zen)$
}

# windowrulev2 = center,class:^(zen-twilight)$
# windowrulev2 = size 1632 918,class:^(zen-twilight)$
# windowrulev2 = float,class:^(zen-twilight)$
# windowrulev2 = workspace 3 silent,class:^(zen-twilight)$
