# Floating
windowrule {
  name = windowrule-24
  float = on
  match:class = ^(blueberry\.py)$
}

# windowrulev2 = size 1632 918, class:^(steam)$
# windowrulev2 = float, class:^(Code)$
# windowrulev2 = size 1632 918, class:^(Code)$
windowrule {
  name = windowrule-25
  opacity = 0.98
  center = on
  match:class = ^(Code)$
}

windowrule {
  name = windowrule-26
  opacity = 0.98
  match:class = ^(jetbrains-webstorm)$
}

windowrule {
  name = windowrule-27
  float = on
  match:class = ^(guifetch)$   # FlafyDev/guifetch
}

windowrule {
  name = windowrule-28
  float = on
  size = (monitor_w*0.45)
  center = on
  match:class = ^(pavucontrol)$
}

windowrule {
  name = windowrule-29
  float = on
  size = (monitor_w*0.45)
  center = on
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = windowrule-30
  float = on
  size = (monitor_w*0.45)
  center = on
  match:class = ^(nm-connection-editor)$
}



# Tiling
windowrule {
  name = windowrule-31
  tile = on
  match:class = ^dev\.warp\.Warp$
}


# Picture-in-Picture
windowrule {
  name = windowrule-32
  float = on
  keep_aspect_ratio = on
  move = ((monitor_w*0.73)) ((monitor_h*0.72))
  size = (monitor_w*0.25)
  pin = on
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
}


# Dialog windows – float+center these windows.
windowrule {
  name = windowrule-33
  center = on
  float = on
  match:title = ^(Open File)(.*)$
}

windowrule {
  name = windowrule-34
