# Laptop-specific window rules
# Start with common rules, customize as needed

# Example: different opacity for laptop battery saving
# windowrulev2 = opacity 0.95, class:.*

# Add your laptop-specific window rules here
windowrule {
  name = windowrule-19
  float = on
  center = on
  opacity = 0.75
  size = 900 600
  match:class = (kitty)
}